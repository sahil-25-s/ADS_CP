<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Campus Stall Finder{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        nav { background: #2c3e50; color: white; padding: 1rem 2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav h1 { display: inline-block; font-size: 1.5rem; }
        nav ul { list-style: none; float: right; margin-top: 0.5rem; }
        nav ul li { display: inline; margin-left: 2rem; }
        nav ul li a { color: white; text-decoration: none; transition: color 0.3s; }
        nav ul li a:hover { color: #3498db; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .btn { display: inline-block; padding: 0.7rem 1.5rem; background: #3498db; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .btn:hover { background: #2980b9; }
        .btn-secondary { background: #95a5a6; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        {% block styles %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <h1>🏫 Campus Stall Finder</h1>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/map">Map</a></li>
            <li><a href="/stalls">Stalls</a></li>
            <li><a href="/search">Search</a></li>
        </ul>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=geometry" async defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
